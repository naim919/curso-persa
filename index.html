<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>فارسی — Curso de Escritura Persa</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0d0700;}
::-webkit-scrollbar-thumb{background:#5a3010;border-radius:3px;}
body{font-family:'Crimson Pro',Georgia,serif;background:#0d0700;color:#d8c098;min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(.93);opacity:0;}100%{transform:scale(1);opacity:1;}}
.fade-up{animation:fadeUp .35s ease both;}
.pop{animation:pop .22s ease both;}
input:focus{outline:none!important;border-color:#c48a18!important;}

/* TOP BAR */
#topbar{background:#0a0500;border-bottom:1px solid #261404;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 18px rgba(0,0,0,.6);}
#topbar .brand{display:flex;align-items:center;gap:12px;}
#menu-btn{background:none;border:1px solid #261404;color:#b89060;cursor:pointer;
  font-size:17px;padding:3px 10px;border-radius:6px;}
.fa-title{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:24px;color:#c48a18;direction:rtl;}
.brand-sub{font-size:12px;color:#7a5838;}
.pgwrap{display:flex;align-items:center;gap:10px;}
.pglabel{font-size:11px;color:#7a5838;}
.pgbar{width:88px;height:5px;background:#261404;border-radius:3px;overflow:hidden;}
.pgfill{height:100%;background:#c48a18;border-radius:3px;transition:width .5s;}

/* LAYOUT */
#layout{display:flex;max-width:1080px;margin:0 auto;width:100%;}

/* SIDEBAR */
#sidebar{width:220px;flex-shrink:0;background:#120900;border-right:1px solid #261404;
  height:calc(100vh - 52px);overflow-y:auto;position:sticky;top:52px;transition:width .2s,overflow .2s;}
#sidebar.closed{width:0;overflow:hidden;border:none;}
.sb-head{padding:12px 14px 6px;font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:#7a5838;text-transform:uppercase;border-bottom:1px solid #261404;}
.sb-btn{display:block;width:100%;text-align:left;padding:9px 14px;border:none;
  border-left:3px solid transparent;cursor:pointer;background:transparent;
  color:#d8c098;font-size:12.5px;font-family:'Crimson Pro',serif;
  transition:background .15s;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-btn:hover{background:#1c1004;}
.sb-btn.active{background:#221008;border-left-color:#c48a18;color:#c48a18;}
.sb-icon{font-size:11px;margin-right:6px;}

/* MAIN */
#main{flex:1;padding:26px 24px 80px;min-width:0;overflow-y:auto;}
.ls{font-size:11px;letter-spacing:2.5px;color:#7a5838;text-transform:uppercase;margin-bottom:5px;}
h1.lt{font-family:'Crimson Pro',serif;font-size:27px;font-weight:600;color:#f0ddb0;
  border-bottom:1px solid #261404;padding-bottom:12px;margin-bottom:22px;}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;color:#7a5838;
  text-transform:uppercase;margin-bottom:10px;}

/* ARABIC TEXT helper class */
.ar{font-family:'Noto Naskh Arabic','Amiri',serif;direction:rtl;}
.gold{color:#c48a18;}

/* CARDS */
.card{background:#1c1004;border:1px solid #261404;border-radius:9px;}

/* HERO */
.letter-hero{display:flex;gap:18px;margin-bottom:24px;flex-wrap:wrap;}
.letter-big{background:linear-gradient(160deg,#1e0e04,#3d1a00);border:1px solid #4a2808;
  border-radius:16px;padding:26px 34px;text-align:center;min-width:150px;flex-shrink:0;
  box-shadow:0 8px 28px rgba(0,0,0,.45);}
.letter-big .lchar{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:96px;
  line-height:1;color:#c48a18;direction:rtl;display:block;}
.letter-big .lname{font-family:'Crimson Pro',serif;font-size:18px;color:#f0ddb0;margin-top:8px;}
.letter-big .lrom{font-size:13px;color:#b89060;font-style:italic;margin-top:3px;}
.letter-info{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
.info-row{background:#1c1004;border:1px solid #261404;border-radius:8px;padding:11px 14px;}
.info-row .ir-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#7a5838;
  text-transform:uppercase;margin-bottom:3px;}
.info-row .ir-val{font-size:13.5px;color:#d8c098;line-height:1.6;}
.noconnect{background:#1e1200;border:1px solid #6b4a10;border-radius:8px;
  padding:10px 14px;font-size:13px;color:#d0a040;}

/* FORMS */
.forms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px;margin-bottom:22px;}
.form-card{background:#1c1004;border:1px solid #261404;border-radius:9px;padding:12px;text-align:center;}
.form-card .fc-char{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:42px;
  color:#f0ddb0;direction:rtl;display:block;line-height:1.2;}
.form-card .fc-name{font-size:11px;font-weight:700;color:#a87848;margin-top:5px;}
.form-card .fc-note{font-size:10px;color:#7a5838;margin-top:2px;}

/* POSITIONS */
.pos-section{margin-bottom:26px;border-radius:12px;overflow:hidden;border:1px solid #261404;}
.pos-section.init{border-color:#1a4a1a;}
.pos-section.mid{border-color:#4a2808;}
.pos-section.fin{border-color:#0a3060;}

.pos-header{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.pos-header.init{background:#071507;}
.pos-header.mid{background:#1a0e00;}
.pos-header.fin{background:#060f1a;}
.pos-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.pos-badge.init{background:#1a5018;}
.pos-badge.mid{background:#c48a18;}
.pos-badge.fin{background:#0a3868;}
.pos-label{font-size:13px;font-weight:700;}
.pos-label.init{color:#5abf5a;}
.pos-label.mid{color:#e0a820;}
.pos-label.fin{color:#4a9adf;}
.pos-note{font-size:11.5px;color:#7a5838;margin-top:2px;}

/* FORM SHOWCASE — the big form display inside each position block */
.form-showcase{display:flex;align-items:center;gap:0;padding:14px 16px 12px;border-bottom:1px solid #261404;}
.form-showcase.init{background:#0a1e0a;border-color:#1a4a1a;}
.form-showcase.mid{background:#1e1200;border-color:#4a2808;}
.form-showcase.fin{background:#090f1e;border-color:#0a3060;}
.form-showcase-left{flex-shrink:0;text-align:center;padding-right:16px;border-right:1px solid #261404;}
.form-showcase.init .form-showcase-left{border-color:#1a4a1a;}
.form-showcase.mid .form-showcase-left{border-color:#4a2808;}
.form-showcase.fin .form-showcase-left{border-color:#0a3060;}
.form-name-tag{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.form-name-tag.init{color:#3a8a3a;}
.form-name-tag.mid{color:#8a6010;}
.form-name-tag.fin{color:#1a5080;}
.form-big-char{font-family:'Noto Naskh Arabic','Amiri',serif;direction:rtl;display:block;
  font-size:58px;line-height:1;}
.form-big-char.init{color:#5abf5a;}
.form-big-char.mid{color:#e0a820;}
.form-big-char.fin{color:#4a9adf;}
.form-showcase-right{flex:1;padding-left:16px;}
.form-showcase-desc{font-size:12px;color:#7a5838;line-height:1.6;margin-bottom:4px;}
.form-showcase-arrow{font-size:11px;color:#5a3810;margin-bottom:6px;}

.rare-note{background:#1e1200;border:1px solid #5a3800;border-radius:0;
  padding:8px 16px;font-size:12.5px;color:#c08830;}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0;
  background:#0d0700;}
.ex-card{background:#1c1004;border-right:1px solid #261404;border-bottom:1px solid #261404;
  padding:14px 14px;text-align:center;}
.ex-card:last-child{border-right:none;}
.ex-word{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:34px;direction:rtl;
  color:#f0ddb0;line-height:1.2;display:block;margin-bottom:4px;}
/* 
  CRITICAL: Do NOT add font-weight or font-size to .hl inside Arabic text.
  Changing font-weight forces the browser to switch font faces, which creates
  a "shaping boundary" and breaks Arabic letter joining (the letter renders in
  isolated form instead of its correct initial/medial/final form).
  Only color + underline are safe — they don't change the font metrics.
*/
.ex-word .hl{
  color:#c48a18;
  text-decoration:underline;
  text-underline-offset:4px;
  text-decoration-thickness:2px;
  text-decoration-color:rgba(196,138,24,.55);
}

/* Form badge shown on each example card */
.ex-form-badge{
  display:inline-block;
  font-family:'Noto Naskh Arabic','Amiri',serif;
  font-size:20px;
  direction:rtl;
  background:rgba(196,138,24,.12);
  border:1px solid rgba(196,138,24,.3);
  border-radius:6px;
  padding:2px 8px;
  margin-bottom:6px;
  line-height:1.3;
}
.ex-form-badge.init{color:#5abf5a;border-color:rgba(90,191,90,.35);background:rgba(90,191,90,.08);}
.ex-form-badge.mid {color:#e0a820;border-color:rgba(224,168,32,.35);background:rgba(224,168,32,.08);}
.ex-form-badge.fin {color:#4a9adf;border-color:rgba(74,154,223,.35);background:rgba(74,154,223,.08);}
.ex-form-name{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.ex-form-name.init{color:#3a8a3a;}
.ex-form-name.mid{color:#8a6010;}
.ex-form-name.fin{color:#1a5080;}

.ex-rom{font-size:12.5px;color:#c48a18;font-style:italic;margin-bottom:2px;}
.ex-mean{font-size:13px;color:#7a5838;}

/* TIP */
.tip-box{background:#071507;border:1px solid #1a4a1a;border-radius:9px;
  padding:11px 15px;margin-bottom:22px;font-size:13.5px;color:#70b870;
  display:flex;gap:9px;line-height:1.65;}
.tip-icon{font-size:17px;flex-shrink:0;}

/* INTRO */
.intro-hero{background:linear-gradient(160deg,#1e0e04,#5c2800);border-radius:14px;
  padding:28px 32px;margin-bottom:24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.intro-hero .big-fa{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:72px;
  color:#c48a18;direction:rtl;display:block;margin-bottom:8px;}
.intro-hero p{font-size:15px;color:#b89060;}
.intro-item{background:#1c1004;border:1px solid #261404;border-radius:10px;
  padding:14px 18px;margin-bottom:11px;display:flex;gap:14px;}
.intro-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#c48a18;
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.intro-item h3{font-family:'Crimson Pro',serif;font-size:15px;color:#d07070;margin-bottom:4px;}
.intro-item p{font-size:13.5px;color:#d8c098;line-height:1.65;}

/* FINAL */
.final-hero{background:linear-gradient(160deg,#1e0e04,#5c1010);border-radius:12px;
  padding:22px 28px;margin-bottom:24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.final-hero h2{font-family:'Crimson Pro',serif;font-size:21px;color:#c48a18;margin-bottom:5px;}
.final-hero p{font-size:14px;color:#b89060;}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:7px;margin-bottom:24px;}
.alpha-cell{background:#1c1004;border:1px solid #261404;border-radius:8px;padding:10px 6px;text-align:center;}
.alpha-cell .al{font-family:'Noto Naskh Arabic',serif;font-size:30px;color:#c48a18;direction:rtl;display:block;}
.alpha-cell .aln{font-size:10px;font-weight:700;color:#c07070;}
.alpha-cell .alr{font-size:9.5px;color:#7a5838;}
.next-steps{background:#1c1004;border:1px solid #261404;border-radius:9px;
  padding:16px 18px;margin-bottom:20px;}
.next-steps h3{font-family:'Crimson Pro',serif;color:#d07070;font-size:15px;margin-bottom:8px;}
.next-steps ol{padding-left:18px;line-height:2.1;font-size:13.5px;color:#d8c098;}

/* PRACTICE */
.practice-wrap{margin-bottom:22px;}
.practice-box{background:#1c1004;border:1px solid #4a2808;border-radius:12px;padding:18px 20px;}
.prac-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.prac-title{font-size:10px;font-weight:700;letter-spacing:2px;color:#7a5838;text-transform:uppercase;}
.prac-dots{display:flex;gap:4px;}
.prac-dot{height:8px;border-radius:4px;transition:all .2s;}
.prac-word-box{background:#120900;border-radius:10px;padding:18px 14px;text-align:center;
  margin-bottom:14px;border:1px solid #261404;}
.prac-word{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:46px;direction:rtl;
  color:#f0ddb0;line-height:1.2;}
.prac-word .hl{color:#c48a18;text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:2px;}
.prac-counter{font-size:11px;color:#7a5838;margin-top:6px;}
.prac-tip{font-size:12px;color:#7a5838;font-style:italic;margin-bottom:12px;padding:0 4px;}
.prac-input-lbl{font-size:12.5px;color:#b89060;margin-bottom:6px;}
.prac-input-row{display:flex;gap:8px;}
.prac-input{flex:1;padding:9px 13px;border:1px solid #4a2808;border-radius:7px;
  font-size:14px;font-family:'Crimson Pro',serif;background:#120900;color:#f0ddb0;}
.prac-btn{background:#c48a18;color:#fff;border:none;border-radius:7px;
  padding:9px 18px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Crimson Pro',serif;}
.prac-result-word{background:#120900;border-radius:8px;padding:10px 14px;margin-bottom:12px;text-align:center;}
.prac-result-word .rw{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:28px;color:#c48a18;direction:rtl;}
.prac-result-word .rom{font-size:13px;color:#c48a18;font-style:italic;margin:0 8px;}
.prac-result-word .mng{font-size:13px;color:#7a5838;}
.prac-next-btn{background:#1c1004;color:#b89060;border:1px solid #4a2808;border-radius:7px;
  padding:9px 22px;cursor:pointer;font-size:14px;font-family:'Crimson Pro',serif;}
.prac-start-btn{background:#c48a18;color:#fff;border:none;border-radius:8px;
  padding:10px 24px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Crimson Pro',serif;}
.prac-start-info{font-size:13.5px;color:#d8c098;line-height:1.7;margin-bottom:14px;}
.prac-finish-box{text-align:center;padding:10px 0;}
.prac-finish-emoji{font-size:40px;margin-bottom:10px;}
.prac-finish-score{font-family:'Crimson Pro',serif;font-size:20px;color:#c48a18;margin-bottom:6px;}
.prac-finish-msg{font-size:13.5px;color:#d8c098;margin-bottom:16px;}
.prac-repeat-btn{background:#120900;color:#b89060;border:1px solid #4a2808;border-radius:7px;
  padding:8px 20px;cursor:pointer;font-size:13.5px;font-family:'Crimson Pro',serif;}
.ok-text{font-size:16px;font-weight:700;margin-bottom:8px;color:#5abf5a;text-align:center;}
.no-text{font-size:16px;font-weight:700;margin-bottom:8px;color:#e05555;text-align:center;}

/* NAV */
.nav-bar{display:flex;justify-content:space-between;align-items:center;
  padding-top:20px;border-top:1px solid #261404;}
.nav-prev,.nav-next{border:none;border-radius:7px;padding:9px 20px;cursor:pointer;
  font-size:13.5px;font-family:'Crimson Pro',serif;transition:all .15s;}
.nav-prev{background:#1c1004;color:#d8c098;border:1px solid #4a2808;}
.nav-prev:disabled{opacity:.35;cursor:default;}
.nav-next{background:#c48a18;color:#fff;font-weight:700;}
.nav-next:disabled{background:#1c1004;color:#7a5838;opacity:.4;cursor:default;}
.nav-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:260px;}
.nav-dot{height:7px;border-radius:3.5px;cursor:pointer;transition:all .2s;}

@media(max-width:600px){
  #main{padding:18px 12px 60px;}
  .letter-big .lchar{font-size:72px;}
  h1.lt{font-size:21px;}
  .brand-sub{display:none;}
  .sidebar-open #sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:200;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">
    <button id="menu-btn" onclick="toggleSB()">☰</button>
    <span class="fa-title">فارسی</span>
    <span class="brand-sub">Curso de Escritura Persa</span>
  </div>
  <div class="pgwrap">
    <span class="pglabel" id="pglabel">0%</span>
    <div class="pgbar"><div class="pgfill" id="pgfill" style="width:0%"></div></div>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sb-head">Lecciones</div>
    <div id="sblist"></div>
  </div>
  <div id="main">
    <div id="content"></div>
  </div>
</div>

<script>
'use strict';

// ─── DATA ────────────────────────────────────────────────────
const LESSONS = [
{id:0,title:"Bienvenida al curso",sub:"Lección 0 — Antes de empezar",isIntro:true,
 intro:[
  {h:"¿Qué es el persa?",t:"El persa (فارسی — Fārsi) es la lengua oficial de Irán. Lo hablan ~110 millones de personas y tiene más de 1.000 años de tradición poética."},
  {h:"Se escribe de derecha a izquierda",t:"Al contrario que el español, el persa se escribe y lee de DERECHA → IZQUIERDA. Las líneas también empiezan por el lado derecho."},
  {h:"Las letras se unen como cursiva",t:"La mayoría de letras conectan con las vecinas. Cada letra tiene hasta 4 formas: aislada, inicial, media y final."},
  {h:"7 letras 'rompedoras de cadena'",t:"Estas siete letras NO conectan con la siguiente: ا، د، ذ، ر، ز، ژ، و. Aunque estén en mitad de una palabra, la 'cortan'."},
  {h:"32 letras en total",t:"Las 28 del árabe + 4 exclusivas del persa: پ (pe), چ (che), ژ (zhe) y گ (gaf). Las aprenderás una por una, sin prisas."},
  {h:"Las vocales cortas no se escriben",t:"En persa estándar, las vocales cortas (a, e, o) no se escriben. Solo las largas ā, i, u. El contexto ayuda a leer."},
 ],
 tip:"Este curso va despacio: una letra por lección, con ejemplos en cada posición y práctica acumulativa."
},
{id:1,letter:"ا",hlExtra:["آ"],name:"Alef",rom:"ā",
 sound:"Vocal larga /ā/ o apoyo de vocal corta /a/, /e/, /o/",noConnect:true,
 desc:"La letra más sencilla: una línea vertical recta, como el número 1. No conecta con la letra siguiente.",
 write:"Traza una línea recta de arriba hacia abajo. Sin curvas, sin levantar el lápiz.",
 forms:[{char:"ا",name:"Aislada / Inicial"},{char:"ـا",name:"Media / Final",note:"Después de conectora"}],
 positions:[
  {type:"init",note:"La Alef comienza la palabra.",ex:[{w:"اتاق",i:0,r:"otāq",m:"habitación"},{w:"اسب",i:0,r:"asb",m:"caballo"},{w:"ایران",i:0,r:"Irān",m:"Irán"}]},
  {type:"mid",note:"Después de conectora, recibe la cola (ـا).",ex:[{w:"باد",i:1,r:"bād",m:"viento"},{w:"کار",i:1,r:"kār",m:"trabajo"},{w:"مادر",i:1,r:"mādar",m:"madre"}]},
  {type:"fin",note:"Misma forma que en posición media.",ex:[{w:"صدا",i:2,r:"sedā",m:"voz"},{w:"دنیا",i:3,r:"donyā",m:"mundo"},{w:"جا",i:1,r:"jā",m:"lugar"}]},
 ],
 practice:[
  {w:"آ",r:"ā",m:"sonido /ā/ largo (alef con madda)",tip:"Esta es la forma آ de alef: vocal /ā/ pura."},
  {w:"ا",r:"a",m:"alef sola (apoyo vocálico)",tip:"Alef sola suena como vocal inicial."},
 ],
 tip:"Alef es la más fácil. Solo una línea. ¡Practica 20 trazos seguidos!"},
{id:2,letter:"ب",name:"Be",rom:"b",
 sound:"/b/ como en 'barco'",
 desc:"Base en forma de barca o cuenco con UN punto debajo. Conecta por los dos lados.",
 write:"Dibuja la curva horizontal (el cuenco). Añade un punto debajo del centro.",
 forms:[{char:"ب",name:"Aislada"},{char:"بـ",name:"Inicial"},{char:"ـبـ",name:"Media"},{char:"ـب",name:"Final"}],
 positions:[

// ─── STATE ────────────────────────────────────────────────────
let cur = 0;
const done = new Set();
let sbOpen = true;

// Practice state per lesson (reset when lesson changes)
let prac = { started:false, idx:0, val:'', checked:false, score:0, finished:false };

// ─── HELPERS ──────────────────────────────────────────────────
function hlWord(word, lesson) {
  const hlChars = [lesson.letter, ...(lesson.hlExtra||[])].filter(Boolean);
  return [...word].map(ch => hlChars.includes(ch)
    ? `<span class="hl">${ch}</span>` : ch
  ).join('');
}

function posCfg(type) {
  return {
    init:{icon:'▶',label:'AL INICIO de palabra',  cls:'init'},
    mid: {icon:'◉',label:'EN EL MEDIO de palabra',cls:'mid'},
    fin: {icon:'◀',label:'AL FINAL de palabra',   cls:'fin'},
  }[type];
}

function tipBox(t) {
  return `<div class="tip-box"><span class="tip-icon">🍎</span><span><strong style="color:#90d890">Consejo:</strong> ${t}</span></div>`;
}

function secLabel(t) {
  return `<div class="sec-lbl">${t}</div>`;
}

// ─── PRACTICE CHECK ───────────────────────────────────────────
function checkAnswer(input, correctRom) {
  const accepted = correctRom.toLowerCase().split('/').map(s=>s.trim());
  const raw = input.toLowerCase().trim();
  return accepted.some(a => raw===a || raw===a.replace(/ā/g,'a') || raw.replace(/ā/g,'a')===a.replace(/ā/g,'a'));
}

// ─── RENDER FUNCTIONS ─────────────────────────────────────────
function renderHlWord(word, lesson, size=46) {
  return `<span class="prac-word ar" style="font-size:${size}px">${hlWord(word,lesson)}</span>`;
}

function renderPractice(L) {
  if (!L.practice || !L.practice.length) return '';
  const items = L.practice;

  if (prac.finished) {
    const pct = Math.round(prac.score / items.length * 100);
    const emoji = pct===100?'🌟':pct>=70?'✅':'📖';
    const msg = pct===100?'¡Perfecto! Dominas todas las palabras de esta lección.':
                pct>=70?'¡Muy bien! Repasa las que fallaste.':'Sigue practicando. Cada repaso cuenta.';
    return `<div class="practice-wrap">
      <div class="practice-box">
        <div class="prac-title" style="margin-bottom:12px">📝 Práctica acumulativa</div>
        <div class="prac-finish-box pop">
          <div class="prac-finish-emoji">${emoji}</div>
          <div class="prac-finish-score">${prac.score} / ${items.length} correctas</div>
          <div class="prac-finish-msg">${msg}</div>
          <button class="prac-repeat-btn" onclick="practiceRepeat()">Repetir práctica</button>
        </div>
      </div>
    </div>`;
  }

  if (!prac.started) {
    return `<div class="practice-wrap">
      <div class="practice-box">
        <div class="prac-title" style="margin-bottom:10px">📝 Práctica acumulativa</div>
        <div class="prac-start-info">
          <strong style="color:#c48a18">${items.length} palabras</strong> que solo usan letras ya aprendidas.
          La letra de esta lección aparece <strong style="color:#c48a18">resaltada en dorado</strong> en cada palabra.
          ${L.note?`<br><em style="color:#7a5838;font-size:12px">${L.note}</em>`:''}
        </div>
        <button class="prac-start-btn" onclick="practiceStart()">Empezar práctica</button>
      </div>
    </div>`;
  }

  const it = items[prac.idx];
  // Progress dots
  const dots = items.map((_,i)=>`<div class="prac-dot" style="width:${i===prac.idx?16:8}px;background:${i<prac.idx?'#5abf5a':i===prac.idx?'#c48a18':'#261404'}"></div>`).join('');

  let inner = '';
  if (!prac.checked) {
    inner = `
      <div class="prac-input-lbl">¿Cómo se pronuncia esta palabra? (escribe la transliteración)</div>
      <div class="prac-input-row">
        <input id="pracInput" class="prac-input" placeholder="p.ej. āb, salām, dast..."
          value="${prac.val.replace(/"/g,'&quot;')}"
          onkeydown="if(event.key==='Enter')practiceCheck()"
          oninput="prac.val=this.value"/>
        <button class="prac-btn" onclick="practiceCheck()">✓</button>
      </div>`;
  } else {
    const ok = checkAnswer(prac.val, it.r);
    inner = `
      <div class="${ok?'ok-text':'no-text'} pop">${ok?'✅ ¡Correcto!':'❌ Era: '+it.r}</div>
      <div class="prac-result-word pop">
        <span class="rw ar">${it.w}</span>
        <span class="rom">${it.r}</span>
        <span class="mng">= ${it.m}</span>
      </div>
      <div style="text-align:center">
        <button class="prac-next-btn" onclick="practiceNext()">${prac.idx<items.length-1?'Siguiente →':'Ver resultado'}</button>
      </div>`;
  }

  return `<div class="practice-wrap">
    <div class="practice-box">
      <div class="prac-header">
        <div class="prac-title">📝 Práctica acumulativa</div>
        <div class="prac-dots">${dots}</div>
      </div>
      <div class="prac-word-box pop">
        ${renderHlWord(it.w, L)}
        <div class="prac-counter">Ejercicio ${prac.idx+1} de ${items.length}</div>
      </div>
      <div class="prac-tip">💡 ${it.tip}</div>
      ${inner}
    </div>
  </div>`;
}

// Practice event handlers
function practiceStart() {
  prac = {started:true, idx:0, val:'', checked:false, score:0, finished:false};
  renderLesson();
  setTimeout(()=>{const el=document.getElementById('pracInput');if(el){el.focus();}}, 60);
}
function practiceCheck() {
  if (!prac.val.trim()) return;
  prac.checked = true;
  const L = LESSONS[cur];
  const it = L.practice[prac.idx];
  if (checkAnswer(prac.val, it.r)) prac.score++;
  renderLesson();
}
function practiceNext() {
  const L = LESSONS[cur];
  if (prac.idx < L.practice.length - 1) {
    prac.idx++; prac.val=''; prac.checked=false;
    renderLesson();
    setTimeout(()=>{const el=document.getElementById('pracInput');if(el){el.focus();}}, 60);
  } else {
    prac.finished = true;
    renderLesson();
  }
}
function practiceRepeat() {
  prac = {started:true, idx:0, val:'', checked:false, score:0, finished:false};
  renderLesson();
  setTimeout(()=>{const el=document.getElementById('pracInput');if(el){el.focus();}}, 60);
}

function renderLetterLesson(L) {
  let h = '';
  // Hero
  h += `<div class="letter-hero">
    <div class="letter-big">
      <span class="lchar">${L.letter}</span>
      <div class="lname">${L.name}</div>
      <div class="lrom">${L.rom}</div>
    </div>
    <div class="letter-info">
      <div class="info-row"><div class="ir-lbl">Sonido</div><div class="ir-val">${L.sound}</div></div>
      <div class="info-row"><div class="ir-lbl">Descripción</div><div class="ir-val">${L.desc}</div></div>
      <div class="info-row"><div class="ir-lbl">Cómo trazarla</div><div class="ir-val">${L.write}</div></div>
      ${L.noConnect?`<div class="noconnect">⚠️ <strong>Rompedora de cadena:</strong> no conecta con la letra siguiente.</div>`:''}
    </div>
  </div>`;

  // Forms
  h += secLabel('Las '+L.forms.length+' formas de '+L.letter+' según su posición');
  h += `<div class="forms-grid">`;
  for (const f of L.forms) {
    // color-code form cards to match position sections
    let borderColor = '#261404', charColor = '#f0ddb0', namColor = '#a87848';
    if (f.name.includes('Inic')) { borderColor='#1a4a1a'; charColor='#5abf5a'; namColor='#3a8a3a'; }
    else if (f.name.includes('Medi') || f.name.includes('medi')) { borderColor='#4a2808'; charColor='#e0a820'; namColor='#8a6010'; }
    else if (f.name.includes('Final') && !f.name.includes('Aislada')) { borderColor='#0a3060'; charColor='#4a9adf'; namColor='#1a5080'; }
    h += `<div class="form-card" style="border-color:${borderColor}">
      <span class="fc-char" style="color:${charColor}">${f.char}</span>
      <div class="fc-name" style="color:${namColor}">${f.name}</div>
      ${f.note?`<div class="fc-note">${f.note}</div>`:''}
    </div>`;
  }
  h += `</div>`;
  h += `<div style="font-size:11.5px;color:#5a3810;margin-bottom:16px;padding:0 2px">
    ↓ A continuación, cada forma en acción con ejemplos reales
  </div>`;

  // Positions — each block shows the specific form large + examples
  const posFormDesc = {
    init: 'Forma que toma la letra al INICIO de palabra, conectando con la siguiente.',
    mid:  'Forma que toma la letra en el MEDIO de palabra, conectada a ambos lados.',
    fin:  'Forma que toma la letra al FINAL de palabra, conectada solo por la derecha.',
  };
  const posFormLabel = { init:'Forma inicial', mid:'Forma medial', fin:'Forma final' };

  for (const pos of L.positions) {
    const cfg = posCfg(pos.type);
    // Find the matching form for this position — use pos.form if provided, else search forms array
    const formNames = { init:['Inicial','Inicial'], mid:['Media','Medial'], fin:['Final'] };
    const matchForm = L.forms.find(f => {
      const n = f.name;
      if (pos.type==='init') return n.includes('Inicial') && !n.includes('Final');
      if (pos.type==='mid')  return n.includes('Media') || n.includes('Medial');
      if (pos.type==='fin')  return n.includes('Final') && !n.includes('Aislada');
      return false;
    });
    const formChar = pos.form || (matchForm ? matchForm.char : L.letter);

    h += `<div class="pos-section ${cfg.cls}">
      <div class="pos-header ${cfg.cls}">
        <div class="pos-badge ${cfg.cls}">${cfg.icon}</div>
        <div>
          <span class="pos-label ${cfg.cls}">${cfg.label}</span>
          ${pos.note?`<div class="pos-note">${pos.note}</div>`:''}
        </div>
      </div>
      <div class="form-showcase ${cfg.cls}">
        <div class="form-showcase-left">
          <div class="form-name-tag ${cfg.cls}">${posFormLabel[pos.type]}</div>
          <span class="form-big-char ${cfg.cls}">${formChar}</span>
        </div>
        <div class="form-showcase-right">
          <div class="form-showcase-desc">${posFormDesc[pos.type]}</div>
          <div class="form-showcase-arrow">↓ En cada ejemplo verás esta forma con subrayado dorado en la palabra real</div>
        </div>
      </div>
      ${pos.rare?`<div class="rare-note">📌 ${pos.rare}</div>`:''}
      <div class="ex-grid">`;
    const posNameShort = {init:'forma inicial', mid:'forma medial', fin:'forma final'};
    for (const e of pos.ex) {
      const wArr = [...e.w];
      const wHtml = wArr.map((ch,i)=>i===e.i?`<span class="hl">${ch}</span>`:ch).join('');
      h += `<div class="ex-card">
        <div class="ex-form-name ${cfg.cls}">${posNameShort[pos.type]}</div>
        <span class="ex-form-badge ${cfg.cls}">${formChar}</span>
        <span class="ex-word ar">${wHtml}</span>
        <div class="ex-rom">${e.r}</div>
        <div class="ex-mean">${e.m}</div>
      </div>`;
    }
    h += `</div></div>`;
  }

  h += tipBox(L.tip);
  h += renderPractice(L);
  return h;
}

function renderIntro(L) {
  let h = `<div class="intro-hero"><span class="big-fa">فارسی</span><p>Bienvenido al Curso de Escritura Persa · Letra por Letra</p></div>`;
  L.intro.forEach((x,i)=>{
    h += `<div class="intro-item">
      <div class="intro-num">${i+1}</div>
      <div><h3>${x.h}</h3><p>${x.t}</p></div>
    </div>`;
  });
  h += tipBox(L.tip);
  return h;
}

function renderFinal(L) {
  let h = `<div class="final-hero"><h2>🎉 ¡Has completado las 32 letras del alfabeto persa!</h2><p>34 lecciones · Una letra a la vez · Con práctica acumulativa</p></div>`;
  h += secLabel('Las 32 letras — repaso rápido');
  h += `<div class="alpha-grid">`;
  for (const a of L.allLetters) {
    h += `<div class="alpha-cell"><span class="al">${a.l}</span><div class="aln">${a.n}</div><div class="alr">/${a.r}/</div></div>`;
  }
  h += `</div>`;
  h += `<div class="next-steps"><h3>📚 ¿Qué estudiar a continuación?</h3><ol>
    <li>Practica leyendo sílabas: consonante + vocal (بَ ba, بِ be, بُ bo)</li>
    <li>Aprende las 100 palabras más comunes del persa</li>
    <li>Estudia los verbos básicos: رفتن (ir), آمدن (venir), خوردن (comer)</li>
    <li>Lee palabras simples con transliteración al lado cada día</li>
    <li>Escucha música iraní prestando atención a los sonidos</li>
    <li>Busca textos con vocales marcadas para practicar la lectura</li>
  </ol></div>`;
  h += tipBox(L.tip);
  return h;
}

function renderNav() {
  const dots = LESSONS.map((_,i) =>
    `<div class="nav-dot" onclick="go(${i})" style="width:${i===cur?18:7}px;background:${i===cur?'#c48a18':done.has(i)?'#7a5c10':'#261404'}"></div>`
  ).join('');
  return `<div class="nav-bar">
    <button class="nav-prev" onclick="prev()" ${cur===0?'disabled':''}>← Anterior</button>
    <div class="nav-dots">${dots}</div>
    <button class="nav-next" onclick="next()" ${cur===LESSONS.length-1?'disabled':''}>Siguiente →</button>
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────
function renderLesson() {
  const L = LESSONS[cur];
  let body = '';
  if (L.isIntro)    body = renderIntro(L);
  else if (L.isFinal) body = renderFinal(L);
  else              body = renderLetterLesson(L);

  document.getElementById('content').innerHTML =
    `<div class="ls">${L.sub||'Lección '+(cur+1)}</div>
     <h1 class="lt">${L.title||L.letter+' — '+L.name}</h1>
     <div class="fade-up">${body}</div>
     ${renderNav()}`;
}

function buildSidebar() {
  document.getElementById('sblist').innerHTML = LESSONS.map((l,i) => {
    const icon = done.has(i)
      ? `<span class="sb-icon" style="color:#5abf5a">✓</span>`
      : `<span class="sb-icon" style="color:#7a5838">${i}.</span>`;
    const label = l.title || `${l.letter} — ${l.name}`;
    return `<button class="sb-btn${i===cur?' active':''}" onclick="go(${i})">${icon}${label}</button>`;
  }).join('');
}

function updateProgress() {
  const pct = Math.round(done.size / LESSONS.length * 100);
  document.getElementById('pgfill').style.width = pct+'%';
  document.getElementById('pglabel').textContent = pct+'% completado';
}

// ─── NAVIGATION ───────────────────────────────────────────────
function go(i) {
  cur = i;
  prac = {started:false, idx:0, val:'', checked:false, score:0, finished:false};
  buildSidebar();
  renderLesson();
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
}
function next() {
  done.add(cur);
  updateProgress();
  if (cur < LESSONS.length-1) go(cur+1);
}
function prev() {
  if (cur > 0) go(cur-1);
}
function toggleSB() {
  sbOpen = !sbOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sbOpen);
}

// ─── INIT ─────────────────────────────────────────────────────
buildSidebar();
renderLesson();
</script>
</body>
</html>
